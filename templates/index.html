<!DOCTYPE html>
<html>
<head>

    <title>Nike Products</title>

    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    >

</head>

<body class="bg-light">

<div class="container mt-4">

    <h2 class="mb-4">
        Nike Products Dashboard
    </h2>

    <table class="table table-bordered table-hover">

        <thead class="table-dark">

            <tr>
                <th>Image</th>
                <th>Name</th>
                <th>Tag</th>
                <th>Price</th>
                <th>Style Code</th>
            </tr>

        </thead>

        <tbody>

        {% for p in products %}

            <tr>

                <td>
                    <img
                      src="{{ p['Product_Image_URL'] }}"
                      width="80"
                    >
                </td>

                <td>
                    <a href="{{ p['Product_URL'] }}">
                        {{ p['Product_Name'] }}
                    </a>
                </td>

                <td>
                    {{ p['Product_Tagging'] }}
                </td>

                <td>
                    {{ p['Discount_Price'] }}
                </td>

                <td>
                    {{ p['Style_Code'] }}
                </td>

            </tr>

        {% endfor %}

        </tbody>

    </table>

</div>

</body>
</html>
